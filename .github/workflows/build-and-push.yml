name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:        # 수동 실행 버튼

# 빈칸 1: OIDC 토큰 발급을 위한 권한
permissions:
  id-token: write           # OIDC JWT 토큰 발급용
  contents: read            # 소스코드 읽기용

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # 새 push 오면 이전 작업 취소

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # CD job에서 사용할 값 노출
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
      image_uri: ${{ steps.tag.outputs.uri }}

    steps:
      # 1. 소스코드 가져오기
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. JDK 17 설정 + Maven 캐시
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'            # Maven 의존성 캐싱

      # 3. Maven 빌드
      - name: Build with Maven
        run: mvn -B package -DskipTests

      # 4. AWS OIDC 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. 이미지 태그 생성
      - name: Generate image tag
        id: tag
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          URI="$ECR_REGISTRY/$ECR_REPOSITORY:$TAG"
          echo "value=$TAG" >> $GITHUB_OUTPUT
          echo "uri=$URI" >> $GITHUB_OUTPUT

      # 7. Docker Buildx 설정 (캐시 사용을 위해 필요)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. Docker 이미지 빌드 & ECR Push
      - name: Build, tag, and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .                         # Dockerfile 위치 (루트)
          push: true                         # 빌드 후 자동 Push
          tags: |
            ${{ steps.tag.outputs.uri }}     # 버전 태그 (예: 15-a1b2c3d)
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ steps.tag.outputs.value }}
          cache-from: type=gha              # GitHub Actions 캐시에서 레이어 가져오기
          cache-to: type=gha,mode=max       # 캐시 저장 (max = 모든 레이어)

      # 9. Config 레포 이미지 태그 업데이트
      - name: Update image tag in config repo
        env:
          GH_TOKEN: ${{ secrets.CONFIG_REPO_PAT }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/team5/petcarelog-config.git
          cd petcarelog-config

          sed -i "s|image:.*|image: ${{ steps.tag.outputs.uri }}|g" \
            apps/petcarelog/overlays/dev/patch-deployment.yaml

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "chore(image): bump petcarelog to ${{ steps.tag.outputs.value }}"
          git push