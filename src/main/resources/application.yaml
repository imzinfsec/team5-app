server:
  port: 8080

spring:
  application:
    name: petcarelog

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petcarelog_dev}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:petcare}
    password: ${DB_PASSWORD:petcare1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  web:
    resources:
      static-locations:
        - file:${user.dir}/uploads/
        - classpath:/static/

upload:
  dir: ${user.dir}/uploads/pets

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always