<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Care Log</title>

  <link rel="stylesheet" href="./css/00-tokens.css" />
  <link rel="stylesheet" href="./css/01-base.css" />
  <link rel="stylesheet" href="./css/02-calendar.css" />
  <link rel="stylesheet" href="./css/03-home.css" />
  <link rel="stylesheet" href="./css/04-tracker.css" />
  <link rel="stylesheet" href="./css/05-settings.css" />
  <link rel="stylesheet" href="./css/06-manage.css" />
  <link rel="stylesheet" href="./css/07-forms.css" />
  <link rel="stylesheet" href="./css/08-nav-modal.css" />
  <link rel="stylesheet" href="./css/09-icons.css" />
</head>

<body>
  <main class="app">

    <!-- 홈 화면 -->
    <section class="page active" id="home">
      <div class="top">
        <div class="title">
          <h1>오늘의 돌봄</h1>
          <p id="homeSubtitle">뽀야의 하루를 기록해요</p>
        </div>
        <button class="text-btn" id="selectedPetBtn">뽀야</button>
      </div>

      <div class="calendar card">
        <div class="calendar-head">
          <button class="month">2026년 05월</button>
          <div class="toggle">
            <button class="active" id="weekBtn">주간</button>
            <button id="monthBtn">월간</button>
          </div>
        </div>

        <div class="weekdays">
          <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span>
        </div>

        <div class="dates" id="dates"></div>
      </div>

      <div class="preset-scroll-wrap">
        <button class="scroll-btn left" id="presetPrev" aria-label="이전 프리셋">‹</button>
        <div class="preset-strip" id="homePresets"></div>
        <button class="scroll-btn right" id="presetNext" aria-label="다음 프리셋">›</button>
      </div>

      <div class="section-title">
        <span id="timelineTitle">5월 19일 기록</span>
        <small id="logCount">0개</small>
      </div>

      <div class="timeline card" id="timeline"></div>
    </section>

    <!-- 트래커 화면 -->
    <section class="page" id="tracker">
      <div class="top">
        <div class="title">
          <h1>Weekly Tracker</h1>
          <p id="trackerRange">05.18 - 05.24</p>
        </div>
      </div>
      <div class="tracker-hero card tracker-only">
		  <h2 id="trackerPetTitle">밥이 루틴</h2>
		  <p>
		    <span id="trackerHeroRange">05.25 - 05.31</span>
		    · 선택한 프리셋만 주간 추적해요
		  </p>
		  <div class="tracker-sheet">
		    <div class="mini-week" id="miniWeek"></div>
		  </div>
	</div>
    </section>

    <!-- 관리 화면 -->
    <section class="page" id="settings">
      <div class="top">
        <div class="title">
          <h1>관리</h1>
          <p>반려동물과 프리셋을 관리해요</p>
        </div>

        <form action="/logout" method="post">
          <button class="text-btn" type="submit">로그아웃</button>
        </form>
      </div>
      <div class="profile-card card" id="profileCard"></div>
      <div class="menu card">
        <button id="openPetAdd">
          <span class="menu-left"><span class="menu-icon">🐾</span>반려동물 추가</span>
          <span>›</span>
        </button>

        <button id="openPresetManage">
          <span class="menu-left"><span class="menu-icon">☑</span>할 일 프리셋 관리</span>
          <span>›</span>
        </button>

        <button id="openTrackerManage">
          <span class="menu-left"><span class="menu-icon">▦</span>주간 트래커 요소 관리</span>
          <span>›</span>
        </button>
      </div>

      <div class="section-title">
        <span>내 반려동물 기록집</span>
      </div>
      <div class="section-title"><span>내 반려동물 기록집</span></div>
      <div class="pet-switch" id="petSwitch"></div>
    </section>

    <!-- 프리셋 관리 -->
    <section class="page" id="presetManage">
      <div class="top">
        <button class="back-btn" data-go="settings">‹</button>
        <div class="title" style="text-align:center;flex:1">
          <h1 style="font-size:19px">할 일 프리셋 관리</h1>
          <p>누르면 수정, 길게는 필요 없이 삭제 가능</p>
        </div>
        <button class="plain-btn" id="openPresetAdd">추가</button>
      </div>

      <div id="presetManageList"></div>
    </section>

    <!-- 트래커 관리 -->
    <section class="page" id="trackerManage">
      <div class="top">
        <button class="back-btn" data-go="settings">‹</button>
        <div class="title" style="text-align:center;flex:1">
          <h1 style="font-size:19px">주간 트래커 요소 관리</h1>
          <p>주간표에 표시할 항목을 선택해요</p>
        </div>
        <button class="plain-btn" id="saveTrackerItems">저장</button>
      </div>

      <div id="trackerManageList"></div>
    </section>

    <!-- 프리셋 폼 -->
    <section class="page" id="presetForm">
      <div class="top">
        <button class="back-btn" data-go="presetManage">‹</button>
        <div class="title" style="text-align:center;flex:1">
          <h1 style="font-size:19px" id="presetFormTitle">프리셋 추가</h1>
          <p>카테고리와 아이콘을 선택하세요</p>
        </div>
        <span style="width:38px"></span>
      </div>

      <div class="form-card card">
        <div class="field">
          <label>프리셋 제목</label>
          <input class="input" id="presetName" value="추가" />
        </div>

        <div class="field">
          <label>카테고리 선택</label>
          <div class="chips" id="categoryChips"></div>
        </div>

        <div class="field">
          <label>아이콘 선택</label>
          <div class="icon-grid" id="iconGrid"></div>
        </div>

        <div class="form-actions preset-actions" id="presetActions">
          <button class="text-btn danger" id="deletePreset">삭제</button>
          <button class="text-btn danger" id="cancelPreset">취소</button>
          <button class="text-btn" id="savePreset">확인</button>
        </div>
      </div>
    </section>

    <!-- 반려동물 폼 (이미지 업로드 추가) -->
    <section class="page" id="petForm">
      <div class="top">
        <button class="back-btn" data-go="settings">‹</button>
        <div class="title" style="text-align:center;flex:1">
          <h1 style="font-size:19px" id="petFormTitle">반려동물 추가</h1>
          <p>기록할 반려동물을 추가해요</p>
        </div>
        <button class="plain-btn" id="savePet">확인</button>
      </div>

      <div class="form-card card">

        <!-- 프로필 이미지 업로드 -->
        <div class="field">
          <label>프로필 사진</label>
          <div class="pet-img-upload" id="petImgUploadArea">
            <img id="petImgPreview" src="" alt="프로필 이미지" style="display:none;" />
            <div class="pet-img-placeholder" id="petImgPlaceholder">
              <span>🐾</span>
              <p>사진 추가</p>
            </div>
            <input type="file" id="petImageInput" accept="image/*" style="display:none;" />
          </div>
          <button class="img-upload-btn" id="petImgUploadBtn">📷 사진 선택</button>
        </div>

        <div class="field"><label>이름</label><input class="input" id="petName" placeholder="예: 밥이" /></div>
        <div class="field">
          <label>이름</label>
          <input class="input" id="petName" placeholder="예: 밥이" />
        </div>

        <div class="field">
          <label>종류</label>
          <div class="chips" id="petSpeciesChips">
            <button class="chip active" data-species="강아지" style="--c:#8ebd69">강아지</button>
            <button class="chip" data-species="고양이" style="--c:#6f9ed8">고양이</button>
            <button class="chip" data-species="기타" style="--c:#9168ca">기타</button>
          </div>
        </div>

        <div class="field">
          <label>생일</label>
          <input class="input" id="petBirth" type="date" />
        </div>

        <label class="check-row">
          <input type="checkbox" id="birthUnknown" />
          생일 모름
        </label>

        <div class="form-actions pet-actions" id="petActions">
          <button class="text-btn danger" id="deletePet">반려동물 삭제</button>
        </div>
      </div>
    </section>

    <!-- 하단 네비게이션 -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav active" data-go="home" aria-label="홈">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3 3"/>
        </svg>
      </button>

      <button class="nav" data-go="tracker" aria-label="트래커">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M6 3h9l3 3v15H6z"/>
          <path d="M14 3v4h4"/>
          <path d="M9 14h6"/>
          <path d="M9 17h4"/>
        </svg>
      </button>

      <button class="nav" data-go="settings" aria-label="관리">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/>
          <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.97 2.97l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21a2.1 2.1 0 0 1-4.2 0v-.06a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-1.97.36l-.04.04a2.1 2.1 0 0 1-2.97-2.97l.04-.04A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.09H3a2.1 2.1 0 0 1 0-4.2h.06A1.8 1.8 0 0 0 4.7 8.6a1.8 1.8 0 0 0-.36-1.97l-.04-.04a2.1 2.1 0 1 1 2.97-2.97l.04.04A1.8 1.8 0 0 0 9.3 4.6 1.8 1.8 0 0 0 10.39 3H10.5a2.1 2.1 0 0 1 4.2 0v.06A1.8 1.8 0 0 0 15.8 4.7a1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 1 1 2.97 2.97l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.09H21a2.1 2.1 0 0 1 0 4.2h-.06A1.8 1.8 0 0 0 19.4 15Z"/>
        </svg>
      </button>
    </nav>

    <!-- 기록 상세 모달 -->
    <div class="sheet-bg" id="logSheet">
      <div class="sheet">
        <div class="top">
          <div class="title">
            <h1 style="font-size:22px" id="logTitle">기록 상세</h1>
            <p id="logTime"></p>
          </div>
          <button class="text-btn" id="closeLog">닫기</button>
        </div>

        <div class="form-card card">
          <div class="field">
            <label>메모</label>
            <textarea class="input" id="logMemo"></textarea>
          </div>

          <div class="field">
            <label>시간</label>
            <input class="input" id="logTimeInput" type="time" />
          </div>

          <div class="form-actions">
            <button class="text-btn danger" id="deleteLog">삭제</button>
            <button class="text-btn" id="saveLog">저장</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="./js/data/constants.js"></script>
  <script src="./js/core/api.js"></script>
  <script src="./js/core/state.js"></script>
  <script src="./js/core/utils.js"></script>
  <script src="./js/render/home.js"></script>
  <script src="./js/actions/careLogs.js"></script>
  <script src="./js/render/tracker.js"></script>
  <script src="./js/render/settings.js"></script>
  <script src="./js/render/forms.js"></script>
  <script src="./js/core/bootstrap.js"></script>
  <script src="./js/core/events.js"></script>
  <script src="./js/main.js"></script>

  <!-- 이미지 업로드 인터랙션 -->
  <script>
    const petImgUploadBtn = document.getElementById('petImgUploadBtn');
    const petImageInput = document.getElementById('petImageInput');
    const petImgPreview = document.getElementById('petImgPreview');
    const petImgPlaceholder = document.getElementById('petImgPlaceholder');
    const petImgUploadArea = document.getElementById('petImgUploadArea');

    petImgUploadBtn.addEventListener('click', () => petImageInput.click());
    petImgUploadArea.addEventListener('click', () => petImageInput.click());

    petImageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        petImgPreview.src = ev.target.result;
        petImgPreview.style.display = 'block';
        petImgPlaceholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
